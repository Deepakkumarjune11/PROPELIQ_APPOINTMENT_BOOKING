# CI Workflow — runs on every PR targeting main
# Runs dotnet-ci and frontend-ci in parallel; both must pass for the PR check to be green.
# TR-016 / AC-1 / NFR-015 (OSS-only tooling, free GitHub-hosted runners)

name: CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR on new commits — saves free runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── .NET Backend ─────────────────────────────────────────────────────────────
  dotnet-ci:
    name: .NET Build, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Cache NuGet packages keyed on lock files — avoids redundant HTTP fetches
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore server/PropelIQ.slnx

      - name: Build (Release)
        run: dotnet build server/PropelIQ.slnx --configuration Release --no-restore

      - name: Format check
        run: dotnet format server/PropelIQ.slnx --verify-no-changes

      # Restore local tools (dotnet-ef pinned to 8.0.0 in .config/dotnet-tools.json)
      - name: Restore .NET local tools
        run: dotnet tool restore

      # AC-4: Fail the PR if the EF Core model has changes not captured in a migration.
      # Introduced in EF Core 8.0 — exits 1 on schema drift.
      - name: Check for pending EF Core migrations
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project server/src/Modules/PatientAccess/PatientAccess.Data \
            --startup-project server/src/PropelIQ.Api

      # AC-4 / convention: reject any migration that uses CREATE INDEX CONCURRENTLY
      # without suppressTransaction: true — would deadlock inside EF's implicit transaction.
      - name: Lint migration CONCURRENTLY usage
        run: |
          if grep -rn "CONCURRENTLY" server/src/Modules/PatientAccess/PatientAccess.Data/Migrations/ \
             | grep -v "suppressTransaction: true" \
             | grep -v "\.Designer\.cs" \
             | grep -v "Snapshot\.cs" \
             | grep -q .; then
            echo "ERROR: Found CONCURRENTLY index in migration without suppressTransaction: true."
            echo "Add second parameter: migrationBuilder.Sql(\"...\", suppressTransaction: true)"
            exit 1
          fi
          echo "Migration CONCURRENTLY lint: OK"

      # Retry once before failing — handles transient flaky-test failures (edge case spec)
      - name: Test with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: >
            dotnet test server/PropelIQ.slnx
            --no-build
            --configuration Release
            --logger trx
            --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults/
          retention-days: 14

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules keyed on package-lock.json — avoids full npm ci on every run
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefix client

      - name: Lint
        run: npm run lint --prefix client

      - name: Build
        run: npm run build --prefix client
