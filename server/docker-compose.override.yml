# docker-compose.override.yml — local development overrides
# Loaded automatically by `docker compose up`.
# Exposes service ports to the host and loads credentials from .env.
services:

  db:
    env_file:
      - .env
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    env_file:
      - .env
    ports:
      - "8080:8080"

  frontend:
    ports:
      - "3000:3000"

  # backup-cron: mount scripts/backup into the container at /scripts (read-only)
  # Exposes the local scripts directory without baking them into the image.
  backup-cron:
    env_file:
      - .env
    volumes:
      - ../scripts/backup:/scripts:ro
