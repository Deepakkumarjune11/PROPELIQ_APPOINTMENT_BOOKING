# docker-compose.yml — base service definitions for all environments
# Port bindings and dev-specific overrides live in docker-compose.override.yml.
# All sensitive values are injected via .env (never committed).
services:

  # ── PostgreSQL 15 + pgvector ─────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    container_name: propeliq_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - propeliq-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propeliq_redis
    volumes:
      - redis-data:/data
    networks:
      - propeliq-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ASP.NET Core 8 API ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propeliq_api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: >
        Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};
        Password=${POSTGRES_PASSWORD};Minimum Pool Size=10;Maximum Pool Size=100
      Redis__ConnectionString: redis:6379,abortConnect=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api-logs:/app/logs
    networks:
      - propeliq-net
    restart: unless-stopped

  # ── Backup cron sidecar — development only (profile: backup) ─────────────────
  # Start with: docker compose --profile backup up backup-cron
  #
  # Runs backup.sh on schedule:
  #   Incremental (every 4 hours): 0 */4 * * *
  #   Full weekly (Sunday 02:00):  0 2 * * 0
  #
  # WAL archiving: enable archive_mode on the db service via command override in
  # docker-compose.override.yml, with archive_command pointing to archive_wal.sh.
  #
  # postgresql.conf WAL archiving settings (production — apply via ALTER SYSTEM):
  #   wal_level = replica
  #   archive_mode = on
  #   archive_command = '/scripts/archive_wal.sh %p %f'
  #   archive_timeout = 300  # force WAL segment switch every 5 minutes (RPO ~5 min)
  backup-cron:
    image: postgres:15-alpine
    container_name: propeliq_backup_cron
    entrypoint: >
      sh -c "
        apk add --no-cache openssl bash curl azure-cli &&
        echo '0 */4 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        echo '0 2 * * 0 FULL_BACKUP=1 /scripts/backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE}
      LOCAL_FALLBACK_DIR: /backups
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ../scripts/backup:/scripts:ro
      - backup-data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - propeliq-net
    profiles:
      - backup   # only starts when: docker compose --profile backup up
    restart: unless-stopped

  # ── React 18 Vite Dev Server ─────────────────────────────────────────────────
  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile.dev
    container_name: propeliq_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - api
    volumes:
      - node-modules:/app/node_modules
    networks:
      - propeliq-net
    restart: unless-stopped

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  api-logs:
  node-modules:
  backup-data:   # persistent storage for local fallback backups (backup-cron sidecar)

# ── Isolated bridge network ───────────────────────────────────────────────────
networks:
  propeliq-net:
    driver: bridge
