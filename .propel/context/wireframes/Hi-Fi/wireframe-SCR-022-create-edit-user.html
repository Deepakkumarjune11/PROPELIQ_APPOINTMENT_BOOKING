<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-022: Create/Edit User - Unified Patient Access Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root{--color-primary-500:#2196F3;--color-neutral-300:#E0E0E0;--color-neutral-500:#9E9E9E;--color-neutral-700:#616161;--color-neutral-900:#212121;--spacing-2:16px;--spacing-3:24px;--elevation-16:0 16px 32px rgba(0,0,0,0.22),0 16px 24px rgba(0,0,0,0.30);--border-radius-small:4px;--border-radius-medium:8px}
        *{margin:0;padding:0;box-sizing:border-box}
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal{background:#FFF;border-radius:var(--border-radius-medium);box-shadow:var(--elevation-16);max-width:500px;width:90%;max-height:90vh;overflow:auto}
        .modal-header{padding:var(--spacing-3);border-bottom:1px solid var(--color-neutral-300);display:flex;justify-content:space-between;align-items:center}
        h2{font:500 20px/1 Roboto;color:var(--color-neutral-900)}
        .close-btn{background:none;border:none;color:var(--color-neutral-500);cursor:pointer;padding:4px}
        .modal-body{padding:var(--spacing-3)}
        .input-group{display:flex;flex-direction:column;gap:8px;margin-bottom:var(--spacing-2)}
        label{font:500 14px/143% Roboto;color:var(--color-neutral-700)}
        input,select{padding:12px 14px;border:1px solid var(--color-neutral-300);border-radius:var(--border-radius-small);font:400 16px/150% Roboto}
        .modal-footer{padding:var(--spacing-3);border-top:1px solid var(--color-neutral-300);display:flex;gap:var(--spacing-2);justify-content:flex-end}
        .btn{padding:8px 16px;border:none;border-radius:var(--border-radius-small);font:500 16px/1 Roboto;cursor:pointer;min-height:44px}
        .btn-primary{background:var(--color-primary-500);color:#FFF}
        .btn-secondary{background:transparent;border:1px solid var(--color-neutral-300);color:var(--color-neutral-700)}
    </style>
</head>
<body>
    <!-- Navigation: #save-btn → SCR-021 (User Management) with user created/updated -->
    <div class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Create new user</h2>
                <button class="close-btn" aria-label="Close"><span class="material-icons">close</span></button>
            </div>
            <div class="modal-body">
                <form>
                    <div class="input-group">
                        <label for="name">Full name *</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="email">Email address *</label>
                        <input type="email" id="email" required placeholder="john.doe@hospital.org">
                    </div>
                    <div class="input-group">
                        <label for="role">Role *</label>
                        <select id="role" required>
                            <option value="">Select role</option>
                            <option value="patient">Patient</option>
                            <option value="staff">Staff</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" placeholder="e.g., Cardiology">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary">Cancel</button>
                <button class="btn btn-primary" id="save-btn">Create user</button>
            </div>
        </div>
    </div>
</body>
</html>
