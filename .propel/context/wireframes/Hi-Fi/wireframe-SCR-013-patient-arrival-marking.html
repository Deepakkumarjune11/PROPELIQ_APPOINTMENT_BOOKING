<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-013: Patient Arrival Marking - Unified Patient Access Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root{--color-primary-500:#2196F3;--color-success-500:#4CAF50;--color-neutral-50:#FAFAFA;--color-neutral-300:#E0E0E0;--color-neutral-500:#9E9E9E;--color-neutral-700:#616161;--color-neutral-900:#212121;--spacing-2:16px;--spacing-3:24px;--spacing-4:32px;--elevation-1:0 1px 3px rgba(0,0,0,0.12),0 1px 2px rgba(0,0,0,0.24);--border-radius-small:4px;--border-radius-medium:8px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font:400 16px/150% Roboto;color:var(--color-neutral-700);background:var(--color-neutral-50)}
        .main{max-width:800px;margin:0 auto;padding:var(--spacing-4) var(--spacing-3)}
        h1{font:400 24px/133.4% Roboto;color:var(--color-neutral-900);margin-bottom:var(--spacing-3)}
        .patient-list{background:#FFF;border-radius:var(--border-radius-medium);box-shadow:var(--elevation-1);padding:var(--spacing-3)}
        .patient-item{display:flex;align-items:center;gap:var(--spacing-2);padding:var(--spacing-2);border-bottom:1px solid var(--color-neutral-300)}
        .patient-item:last-child{border-bottom:none}
        input[type="checkbox"]{width:24px;height:24px;cursor:pointer}
        .patient-info{flex:1}
        .btn{padding:8px 16px;border:none;border-radius:var(--border-radius-small);font:500 16px/1 Roboto;cursor:pointer;min-height:44px;background:var(--color-success-500);color:#FFF;width:100%;margin-top:var(--spacing-3)}
    </style>
</head>
<body>
    <!-- Navigation: #mark-arrived-btn → SCR-012 (Same-Day Queue) with updated statuses -->
    <main class="main">
        <h1>Mark patient arrivals</h1>
        <div class="patient-list">
            <div class="patient-item">
                <input type="checkbox" id="patient1" aria-label="Mark Sarah Johnson as arrived">
                <div class="patient-info">
                    <div style="font:500 16px/1 Roboto;color:var(--color-neutral-900)">Sarah Johnson</div>
                    <div style="font:400 14px/143% Roboto;color:var(--color-neutral-500)">9:00 AM • Dr. Smith • Annual checkup</div>
                </div>
            </div>
            <div class="patient-item">
                <input type="checkbox" id="patient2" aria-label="Mark John Davis as arrived">
                <div class="patient-info">
                    <div style="font:500 16px/1 Roboto;color:var(--color-neutral-900)">John Davis</div>
                    <div style="font:400 14px/143% Roboto;color:var(--color-neutral-500)">9:30 AM • Dr. Jones • Follow-up</div>
                </div>
            </div>
            <div class="patient-item">
                <input type="checkbox" id="patient3" aria-label="Mark Emily Wilson as arrived">
                <div class="patient-info">
                    <div style="font:500 16px/1 Roboto;color:var(--color-neutral-900)">Emily Wilson</div>
                    <div style="font:400 14px/143% Roboto;color:var(--color-neutral-500)">10:00 AM • Dr. Lee • Consultation</div>
                </div>
            </div>
        </div>
        <button class="btn" id="mark-arrived-btn">
            <span class="material-icons" style="vertical-align:middle;margin-right:8px">check_circle</span>
            Mark as arrived (0 selected)
        </button>
    </main>
    <script>
        const checkboxes=document.querySelectorAll('input[type="checkbox"]');
        const btn=document.getElementById('mark-arrived-btn');
        checkboxes.forEach(cb=>cb.addEventListener('change',()=>{
            const count=Array.from(checkboxes).filter(c=>c.checked).length;
            btn.innerHTML=`<span class="material-icons" style="vertical-align:middle;margin-right:8px">check_circle</span>Mark as arrived (${count} selected)`;
        }));
    </script>
</body>
</html>
