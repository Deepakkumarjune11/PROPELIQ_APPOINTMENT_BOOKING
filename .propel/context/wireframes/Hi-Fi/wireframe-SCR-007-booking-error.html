<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-007: Booking Error - Unified Patient Access Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root{--color-primary-500:#2196F3;--color-error-50:#FFEBEE;--color-error-500:#F44336;--color-neutral-50:#FAFAFA;--color-neutral-300:#E0E0E0;--color-neutral-700:#616161;--color-neutral-900:#212121;--spacing-2:16px;--spacing-3:24px;--spacing-4:32px;--elevation-1:0 1px 3px rgba(0,0,0,0.12),0 1px 2px rgba(0,0,0,0.24);--border-radius-small:4px;--border-radius-medium:8px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font:400 16px/150% Roboto;color:var(--color-neutral-700);background:var(--color-neutral-50);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--spacing-4)}
        .error-card{background:#FFF;border-radius:var(--border-radius-medium);padding:var(--spacing-4);box-shadow:var(--elevation-1);max-width:500px;text-align:center}
        .error-icon{width:64px;height:64px;border-radius:50%;background:var(--color-error-500);color:#FFF;display:flex;align-items:center;justify-content:center;margin:0 auto var(--spacing-3)}
        h1{font:500 24px/133.4% Roboto;color:var(--color-neutral-900);margin-bottom:8px}
        .alert{background:var(--color-error-50);border-left:4px solid var(--color-error-500);padding:var(--spacing-2);border-radius:var(--border-radius-small);text-align:left;margin:var(--spacing-3) 0}
        .actions{display:flex;flex-direction:column;gap:var(--spacing-2)}
        .btn{padding:8px 16px;border:none;border-radius:var(--border-radius-small);font:500 16px/1 Roboto;cursor:pointer;min-height:44px}
        .btn-primary{background:var(--color-primary-500);color:#FFF}
        .btn-secondary{background:transparent;border:1px solid var(--color-neutral-300);color:var(--color-neutral-700)}
    </style>
</head>
<body>
    <!-- Navigation: #retry-btn → SCR-001 (Availability Search), #select-another-btn → SCR-002 (Slot Selection) -->
    <div class="error-card">
        <div class="error-icon"><span class="material-icons" style="font-size:40px">error_outline</span></div>
        <h1>Booking failed</h1>
        <p style="color:var(--color-neutral-700);margin-bottom:var(--spacing-3)">We couldn't complete your appointment booking</p>
        <div class="alert">
            <div style="font:500 14px/143% Roboto;color:var(--color-neutral-900);margin-bottom:4px">Slot no longer available</div>
            <div style="font:400 14px/143% Roboto;color:var(--color-neutral-700)">Another patient booked this slot while you were completing your intake. Please select another time.</div>
        </div>
        <div class="actions">
            <button class="btn btn-primary" id="select-another-btn">Select another slot</button>
            <button class="btn btn-secondary" id="retry-btn">Try again</button>
        </div>
    </div>
    <script>
        document.getElementById('select-another-btn').addEventListener('click',()=>console.log('Navigate to SCR-002 Slot Selection'));
        document.getElementById('retry-btn').addEventListener('click',()=>console.log('Navigate to SCR-001 Availability Search'));
    </script>
</body>
</html>
