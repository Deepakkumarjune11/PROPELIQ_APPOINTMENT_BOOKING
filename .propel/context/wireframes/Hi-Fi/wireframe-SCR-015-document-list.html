<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-015: Document List - Unified Patient Access Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root{--color-primary-500:#2196F3;--color-success-500:#4CAF50;--color-warning-500:#FF9800;--color-neutral-50:#FAFAFA;--color-neutral-100:#F5F5F5;--color-neutral-300:#E0E0E0;--color-neutral-500:#9E9E9E;--color-neutral-700:#616161;--color-neutral-900:#212121;--spacing-2:16px;--spacing-3:24px;--elevation-1:0 1px 3px rgba(0,0,0,0.12),0 1px 2px rgba(0,0,0,0.24);--border-radius-small:4px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font:400 16px/150% Roboto;color:var(--color-neutral-700);background:var(--color-neutral-50)}
        .main{max-width:1200px;margin:0 auto;padding:var(--spacing-3)}
        h1{font:400 24px/133.4% Roboto;color:var(--color-neutral-900);margin-bottom:var(--spacing-3)}
        table{width:100%;background:#FFF;border-collapse:collapse;box-shadow:var(--elevation-1)}
        th{background:var(--color-neutral-50);padding:var(--spacing-2);text-align:left;font:500 14px/143% Roboto;border-bottom:2px solid var(--color-neutral-300)}
        td{padding:var(--spacing-2);border-bottom:1px solid var(--color-neutral-300);font:400 14px/143% Roboto}
        tr:hover{background:var(--color-neutral-100)}
        .badge{padding:4px 8px;border-radius:var(--border-radius-small);font:500 12px/1 Roboto;display:inline-block}
        .badge-completed{background:var(--color-success-500);color:#FFF}
        .badge-processing{background:var(--color-primary-500);color:#FFF}
        .badge-review{background:var(--color-warning-500);color:#000}
        .btn-icon{background:none;border:none;color:var(--color-neutral-500);cursor:pointer;padding:4px}
    </style>
</head>
<body>
    <!-- Navigation: Document rows clickable → Document viewer (not in scope) -->
    <main class="main">
        <h1>Clinical documents</h1>
        <table>
            <thead>
                <tr>
                    <th>Document</th>
                    <th>Type</th>
                    <th>Uploaded</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="material-icons" style="vertical-align:middle;margin-right:8px;color:var(--color-neutral-500)">description</span>discharge-summary.pdf</td>
                    <td>Discharge Summary</td>
                    <td>03/10/2024 2:15 PM</td>
                    <td><span class="badge badge-completed">Completed</span></td>
                    <td>
                        <button class="btn-icon" title="Download"><span class="material-icons">download</span></button>
                        <button class="btn-icon" title="Delete"><span class="material-icons">delete</span></button>
                    </td>
                </tr>
                <tr>
                    <td><span class="material-icons" style="vertical-align:middle;margin-right:8px;color:var(--color-neutral-500)">description</span>lab-results-2024-03.pdf</td>
                    <td>Lab Results</td>
                    <td>03/12/2024 9:30 AM</td>
                    <td><span class="badge badge-processing">Processing</span></td>
                    <td>
                        <button class="btn-icon"><span class="material-icons">download</span></button>
                        <button class="btn-icon"><span class="material-icons">delete</span></button>
                    </td>
                </tr>
                <tr>
                    <td><span class="material-icons" style="vertical-align:middle;margin-right:8px;color:var(--color-neutral-500)">description</span>prescription-history.pdf</td>
                    <td>Prescription</td>
                    <td>03/14/2024 11:00 AM</td>
                    <td><span class="badge badge-review">Manual Review</span></td>
                    <td>
                        <button class="btn-icon"><span class="material-icons">download</span></button>
                        <button class="btn-icon"><span class="material-icons">delete</span></button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
