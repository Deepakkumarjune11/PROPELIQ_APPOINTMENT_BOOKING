<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-020: Verification Complete - Unified Patient Access Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root{--color-primary-500:#2196F3;--color-success-50:#E8F5E9;--color-success-500:#4CAF50;--color-neutral-50:#FAFAFA;--color-neutral-500:#9E9E9E;--color-neutral-700:#616161;--color-neutral-900:#212121;--spacing-2:16px;--spacing-3:24px;--spacing-4:32px;--elevation-1:0 1px 3px rgba(0,0,0,0.12),0 1px 2px rgba(0,0,0,0.24);--border-radius-small:4px;--border-radius-medium:8px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font:400 16px/150% Roboto;color:var(--color-neutral-700);background:var(--color-neutral-50);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--spacing-4)}
        .completion-card{background:#FFF;border-radius:var(--border-radius-medium);padding:var(--spacing-4);box-shadow:var(--elevation-1);max-width:600px;text-align:center}
        .success-icon{width:80px;height:80px;border-radius:50%;background:var(--color-success-500);color:#FFF;display:flex;align-items:center;justify-content:center;margin:0 auto var(--spacing-3)}
        h1{font:500 24px/133.4% Roboto;color:var(--color-neutral-900);margin-bottom:8px}
        .alert{background:var(--color-success-50);border-left:4px solid var(--color-success-500);padding:var(--spacing-2);border-radius:var(--border-radius-small);text-align:left;margin:var(--spacing-3) 0}
        .stats{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-2);margin:var(--spacing-3) 0}
        .stat{background:var(--color-neutral-50);padding:var(--spacing-2);border-radius:var(--border-radius-small)}
        .stat-value{font:500 24px/1 Roboto;color:var(--color-neutral-900)}
        .stat-label{font:400 12px/166% Roboto;color:var(--color-neutral-500)}
        .btn{padding:8px 16px;border:none;border-radius:var(--border-radius-small);font:500 16px/1 Roboto;cursor:pointer;min-height:44px;background:var(--color-primary-500);color:#FFF;width:100%}
    </style>
</head>
<body>
    <!-- Navigation: #next-patient-btn → SCR-016 (Patient Chart Review) -->
    <div class="completion-card">
        <div class="success-icon"><span class="material-icons" style="font-size:48px">check_circle</span></div>
        <h1>Verification complete</h1>
        <p style="color:var(--color-neutral-700);margin-bottom:var(--spacing-3)">Patient chart verified and ready for appointment</p>
        <div class="alert">
            <div style="font:500 14px/143% Roboto;color:var(--color-neutral-900);margin-bottom:4px">Chart Summary</div>
            <div style="font:400 14px/143% Roboto;color:var(--color-neutral-700)">Sarah Johnson (MRN-001234) • 15 facts extracted • 3 codes confirmed • 2 conflicts resolved</div>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value">3:42</div>
                <div class="stat-label">Time to verify</div>
            </div>
            <div class="stat">
                <div class="stat-value">95%</div>
                <div class="stat-label">AI confidence avg</div>
            </div>
        </div>
        <button class="btn" id="next-patient-btn">
            <span class="material-icons" style="vertical-align:middle;margin-right:8px">navigate_next</span>
            Next patient
        </button>
    </div>
    <script>
        document.getElementById('next-patient-btn').addEventListener('click',()=>console.log('Navigate to SCR-016 Patient Chart Review'));
    </script>
</body>
</html>
