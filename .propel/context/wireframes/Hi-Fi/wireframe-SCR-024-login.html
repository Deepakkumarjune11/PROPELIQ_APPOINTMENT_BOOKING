<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-024: Login - PropelIQ Healthcare</title>
    <style>
        /* Design Tokens from designsystem.md - Material-UI Healthcare Theme */
        :root {
            /* Primary Colors */
            --color-primary-main: #2196F3;
            --color-primary-dark: #1976D2;
            --color-primary-light: #64B5F6;
            
            /* Semantic Colors */
            --color-error: #F44336;
            --color-success: #4CAF50;
            
            /* Neutral Scale */
            --color-neutral-0: #FFFFFF;
            --color-neutral-50: #FAFAFA;
            --color-neutral-300: #E0E0E0;
            --color-neutral-600: #757575;
            --color-neutral-900: #212121;
            
            /* Typography */
            --font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-size-h4: 1.5rem;
            --font-size-body1: 1rem;
            --font-size-caption: 0.75rem;
            --font-weight-regular: 400;
            --font-weight-medium: 500;
            --line-height-base: 1.5;
            
            /* Spacing (8px grid) */
            --spacing-1: 8px;
            --spacing-2: 16px;
            --spacing-3: 24px;
            --spacing-4: 32px;
            --spacing-6: 48px;
            
            /* Border Radius */
            --radius-small: 4px;
            --radius-medium: 8px;
            
            /* Elevation */
            --shadow-1: 0px 2px 1px -1px rgba(0,0,0,0.2), 0px 1px 1px 0px rgba(0,0,0,0.14), 0px 1px 3px 0px rgba(0,0,0,0.12);
            
            /* Transitions */
            --transition-standard: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-family);
            font-size: var(--font-size-body1);
            line-height: var(--line-height-base);
            color: var(--color-neutral-900);
            background-color: var(--color-neutral-50);
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-2);
        }
        
        .login-card {
            background: var(--color-neutral-0);
            border-radius: var(--radius-medium);
            box-shadow: var(--shadow-1);
            padding: var(--spacing-6);
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: var(--spacing-4);
        }
        
        .logo h1 {
            font-size: var(--font-size-h4);
            font-weight: var(--font-weight-medium);
            color: var(--color-primary-main);
        }
        
        .form-group {
            margin-bottom: var(--spacing-3);
        }
        
        label {
            display: block;
            margin-bottom: var(--spacing-1);
            font-weight: var(--font-weight-medium);
            color: var(--color-neutral-600);
            font-size: 0.875rem;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: var(--spacing-2);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-small);
            font-family: var(--font-family);
            font-size: var(--font-size-body1);
            transition: border-color var(--transition-standard);
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--color-primary-main);
            border-width: 2px;
            padding: calc(var(--spacing-2) - 1px);
        }
        
        input[type="email"].error,
        input[type="password"].error {
            border-color: var(--color-error);
        }
        
        .error-message {
            color: var(--color-error);
            font-size: var(--font-size-caption);
            margin-top: var(--spacing-1);
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-3);
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: var(--spacing-1);
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: var(--font-weight-regular);
        }
        
        .button-group {
            margin-bottom: var(--spacing-2);
        }
        
        .btn {
            width: 100%;
            padding: var(--spacing-2);
            border: none;
            border-radius: var(--radius-small);
            font-family: var(--font-family);
            font-size: 0.875rem;
            font-weight: var(--font-weight-medium);
            text-transform: uppercase;
            cursor: pointer;
            transition: all var(--transition-standard);
            letter-spacing: 0.02857em;
        }
        
        .btn-primary {
            background-color: var(--color-primary-main);
            color: var(--color-neutral-0);
        }
        
        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            box-shadow: 0px 3px 1px -2px rgba(0,0,0,0.2), 0px 2px 2px 0px rgba(0,0,0,0.14), 0px 1px 5px 0px rgba(0,0,0,0.12);
        }
        
        .btn-primary:active {
            background-color: #0D47A1;
        }
        
        .btn-primary:focus {
            outline: 2px solid var(--color-primary-main);
            outline-offset: 2px;
        }
        
        .btn-primary:disabled {
            background-color: var(--color-neutral-300);
            color: #BDBDBD;
            cursor: not-allowed;
        }
        
. link-group {
            text-align: center;
        }
        
        a {
            color: var(--color-primary-main);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color var(--transition-standard);
        }
        
        a:hover {
            color: var(--color-primary-dark);
            text-decoration: underline;
        }
        
        a:focus {
            outline: 2px solid var(--color-primary-main);
            outline-offset: 2px;
            border-radius: 2px;
        }
        
        /* Alert Component */
        .alert {
            padding: var(--spacing-2);
            border-radius: var(--radius-small);
            margin-bottom: var(--spacing-3);
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-error {
            background-color: #FFEBEE;
            color: #C62828;
            border: 1px solid #EF5350;
        }
        
        /* Loading State */
        .btn-primary.loading {
            position: relative;
            color: transparent;
        }
        
        .btn-primary.loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid var(--color-neutral-0);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spinner 0.6s linear infinite;
        }
        
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .login-card {
                padding: var(--spacing-3);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Map
    | Element | Action | Target Screen |
    |---------|--------|---------------|
    | #login-btn | click | SCR-025 (Header/Navigation - role-dependent redirect to patient/staff/admin dashboard) |
    | #forgot-password | click | [Password Reset - not in scope for Phase 1] |
    -->
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>PropelIQ Healthcare</h1>
            </div>
            
            <!-- Error Alert (hidden by default, shown on validation/error state) -->
            <div class="alert alert-error" id="error-alert">
                Invalid email or password. Please try again.
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="name@example.com"
                        required
                        aria-describedby="email-error"
                    />
                    <span class="error-message" id="email-error">Please enter a valid email address</span>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        aria-describedby="password-error"
                    />
                    <span class="error-message" id="password-error">Password is required</span>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember" />
                    <label for="remember">Remember me</label>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        Login
                    </button>
                </div>
                
                <div class="link-group">
                    <a href="#" id="forgot-password">Forgot password?</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Demo: State transitions (default -> loading -> error)
        const form = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorAlert = document.getElementById('error-alert');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            // Simulate authentication (demo only)
            setTimeout(() => {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                
                // Error state (demo)
                errorAlert.classList.add('show');
                document.getElementById('email').classList.add('error');
                document.getElementById('password').classList.add('error');
                
                // In production: redirect to appropriate dashboard based on role
                // window.location.href = 'wireframe-SCR-025-header-navigation.html';
            }, 1500);
        });
        
        // Validation feedback
        document.getElementById('email').addEventListener('blur', function() {
            const emailError = document.getElementById('email-error');
            if (!this.value || !this.value.includes('@')) {
                this.classList.add('error');
                emailError.classList.add('show');
            } else {
                this.classList.remove('error');
                emailError.classList.remove('show');
            }
        });
        
        document.getElementById('password').addEventListener('blur', function() {
            const passwordError = document.getElementById('password-error');
            if (!this.value) {
                this.classList.add('error');
                passwordError.classList.add('show');
            } else {
                this.classList.remove('error');
                passwordError.classList.remove('show');
            }
        });
    </script>
</body>
</html>
