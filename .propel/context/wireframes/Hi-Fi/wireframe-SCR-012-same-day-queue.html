<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-012: Same-Day Queue - Unified Patient Access Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root{--color-success-500:#4CAF50;--color-warning-500:#FF9800;--color-info-500:#2196F3;--color-neutral-50:#FAFAFA;--color-neutral-100:#F5F5F5;--color-neutral-300:#E0E0E0;--color-neutral-500:#9E9E9E;--color-neutral-700:#616161;--color-neutral-900:#212121;--spacing-2:16px;--spacing-3:24px;--elevation-1:0 1px 3px rgba(0,0,0,0.12),0 1px 2px rgba(0,0,0,0.24);--border-radius-small:4px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font:400 16px/150% Roboto;color:var(--color-neutral-700);background:var(--color-neutral-50)}
        .page{display:flex;min-height:100vh}
        .sidebar{width:240px;background:var(--color-neutral-50);border-right:1px solid var(--color-neutral-300);padding:var(--spacing-3)}
        .main{flex:1;padding:var(--spacing-3)}
        h1{font:400 24px/133.4% Roboto;color:var(--color-neutral-900);margin-bottom:var(--spacing-3)}
        table{width:100%;background:#FFF;border-collapse:collapse;box-shadow:var(--elevation-1)}
        th{background:var(--color-neutral-50);padding:var(--spacing-2);text-align:left;font:500 14px/143% Roboto;color:var(--color-neutral-900);border-bottom:2px solid var(--color-neutral-300)}
        td{padding:var(--spacing-2);border-bottom:1px solid var(--color-neutral-300);font:400 14px/143% Roboto}
        tr:hover{background:var(--color-neutral-100)}
        .badge{padding:4px 8px;border-radius:var(--border-radius-small);font:500 12px/1 Roboto;display:inline-block}
        .badge-arrived{background:var(--color-success-500);color:#FFF}
        .badge-waiting{background:var(--color-warning-500);color:#000}
        .badge-queued{background:var(--color-info-500);color:#FFF}
        .btn-icon{background:none;border:none;color:var(--color-neutral-500);cursor:pointer;padding:4px}
    </style>
</head>
<body>
    <!-- Navigation: Rows clickable → SCR-013 (Patient Arrival Marking) -->
    <div class="page">
        <aside class="sidebar"><p style="color:var(--color-neutral-500)">Staff navigation</p></aside>
        <main class="main">
            <h1>Same-day queue</h1>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Patient</th>
                        <th>Provider</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>9:00 AM</td>
                        <td>Sarah Johnson<br><small style="color:var(--color-neutral-500)">MRN-001234</small></td>
                        <td>Dr. Smith</td>
                        <td>Annual checkup</td>
                        <td><span class="badge badge-arrived">Arrived</span></td>
                        <td><button class="btn-icon" title="More actions"><span class="material-icons">more_vert</span></button></td>
                    </tr>
                    <tr>
                        <td>9:30 AM</td>
                        <td>John Davis<br><small style="color:var(--color-neutral-500)">MRN-005678</small></td>
                        <td>Dr. Jones</td>
                        <td>Follow-up</td>
                        <td><span class="badge badge-waiting">Waiting</span></td>
                        <td><button class="btn-icon"><span class="material-icons">more_vert</span></button></td>
                    </tr>
                    <tr>
                        <td>10:00 AM</td>
                        <td>Emily Wilson<br><small style="color:var(--color-neutral-500)">MRN-009012</small></td>
                        <td>Dr. Lee</td>
                        <td>Consultation</td>
                        <td><span class="badge badge-queued">Queued</span></td>
                        <td><button class="btn-icon"><span class="material-icons">more_vert</span></button></td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>
</body>
</html>
